<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pan-India Credit Ops Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f9fc;
  --surface: #ffffff;
  --surface-2: #f1f5f9;
  --border: #e2e8f0;
  --border-strong: #cbd5e1;
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-muted: #94a3b8;
  --blue: #2563eb;
  --blue-light: #eff6ff;
  --blue-text: #1d4ed8;
  --green: #16a34a;
  --green-light: #f0fdf4;
  --green-text: #15803d;
  --amber: #d97706;
  --amber-light: #fffbeb;
  --amber-text: #b45309;
  --red: #dc2626;
  --red-light: #fef2f2;
  --red-text: #b91c1c;
  --purple: #7c3aed;
  --purple-light: #f5f3ff;
  --purple-text: #6d28d9;
  --teal: #0f766e;
  --teal-light: #f0fdfa;
  --teal-text: #0f766e;
  --slate: #64748b;
  --slate-light: #f8fafc;
  --focus: 0 0 0 3px rgba(37,99,235,0.25);
  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.04);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface-2: #263248;
    --border: #334155;
    --border-strong: #475569;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --blue-light: #1e3a5f;
    --blue-text: #93c5fd;
    --green-light: #14532d;
    --green-text: #86efac;
    --amber-light: #451a03;
    --amber-text: #fcd34d;
    --red-light: #450a0a;
    --red-text: #fca5a5;
    --purple-light: #2e1065;
    --purple-text: #c4b5fd;
    --teal-light: #042f2e;
    --teal-text: #5eead4;
    --slate-light: #1e293b;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  color: var(--text-primary);
  background: var(--bg);
  min-height: 100vh;
}

/* Skip link */
.skip-link {
  position: absolute;
  left: -9999px;
  top: 6px;
  padding: 8px 16px;
  background: var(--blue);
  color: #fff;
  font-weight: 600;
  border-radius: var(--radius);
  z-index: 9999;
  text-decoration: none;
}
.skip-link:focus { left: 6px; }

/* Header */
.hdr {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 40;
}

.hdr-brand { display: flex; align-items: center; gap: 12px; }
.hdr-logo {
  width: 32px; height: 32px;
  background: var(--blue);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-weight: 600;
  font-size: 13px;
  flex-shrink: 0;
}
.hdr-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
}
.hdr-sub {
  font-size: 12px;
  color: var(--text-muted);
}
.status-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--green-text);
  background: var(--green-light);
  border: 1px solid rgba(22,163,74,0.2);
  padding: 5px 12px;
  border-radius: 20px;
}
.status-dot {
  width: 7px; height: 7px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* Nav tabs */
.nav-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  gap: 2px;
  overflow-x: auto;
  scrollbar-width: none;
}
.nav-bar::-webkit-scrollbar { display: none; }

.tab {
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: color .15s, border-color .15s;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 7px;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
  font-family: inherit;
}
.tab:hover { color: var(--text-primary); }
.tab.active {
  color: var(--blue);
  border-bottom-color: var(--blue);
  font-weight: 600;
}
.tab:focus-visible { outline: 2px solid var(--blue); outline-offset: -2px; border-radius: 4px 4px 0 0; }
.tab svg { flex-shrink: 0; opacity: .7; }
.tab.active svg { opacity: 1; }

/* Main content */
.main { max-width: 1320px; margin: 0 auto; padding: 28px 24px; }
.sec { display: none; }
.sec.active { display: block; animation: fadeUp .2s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  box-shadow: var(--shadow-sm);
}
.card-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-muted);
  margin-bottom: 16px;
}

/* Metric cards */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.metric-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}
.metric-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--accent, var(--blue));
}
.metric-lbl {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.metric-val {
  font-size: 26px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.1;
}
.metric-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 6px;
}

/* Grid layouts */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
@media (max-width: 900px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
}

/* Bar charts */
.bar-group { display: flex; flex-direction: column; gap: 10px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  width: 140px;
  flex-shrink: 0;
  text-align: right;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bar-track {
  flex: 1;
  height: 8px;
  background: var(--surface-2);
  border-radius: 99px;
  overflow: hidden;
}
.bar-fill {
  height: 8px;
  border-radius: 99px;
  transition: width .6s cubic-bezier(.4,0,.2,1);
  min-width: 4px;
}
.bar-count {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
  width: 32px;
  flex-shrink: 0;
  text-align: right;
}

/* Tags / badges */
.tag {
  display: inline-flex;
  align-items: center;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: var(--radius-sm);
  white-space: nowrap;
}
.tag-blue { background: var(--blue-light); color: var(--blue-text); }
.tag-purple { background: var(--purple-light); color: var(--purple-text); }
.tag-amber { background: var(--amber-light); color: var(--amber-text); }
.tag-green { background: var(--green-light); color: var(--green-text); }
.tag-teal { background: var(--teal-light); color: var(--teal-text); }
.tag-red { background: var(--red-light); color: var(--red-text); }
.tag-slate { background: var(--slate-light); color: var(--slate); }

/* TAT spans */
.tat {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: var(--radius-sm);
}
.tat-ok { background: var(--green-light); color: var(--green-text); }
.tat-watch { background: var(--amber-light); color: var(--amber-text); }
.tat-over { background: var(--red-light); color: var(--red-text); }

/* Tables */
.table-wrap { overflow-x: auto; border-radius: var(--radius); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-muted);
  padding: 10px 14px;
  background: var(--surface-2);
  text-align: left;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
}
th:first-child { border-radius: var(--radius-sm) 0 0 0; }
th:last-child { border-radius: 0 var(--radius-sm) 0 0; }
td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--text-primary);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--surface-2); }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background .15s, box-shadow .15s, transform .1s;
  border: 1px solid var(--border-strong);
  background: var(--surface);
  color: var(--text-primary);
  text-decoration: none;
  white-space: nowrap;
}
.btn:hover { background: var(--surface-2); }
.btn:active { transform: scale(.98); }
.btn:focus-visible { outline: none; box-shadow: var(--focus); }

.btn-primary {
  background: var(--blue);
  color: #fff;
  border-color: transparent;
  font-weight: 600;
}
.btn-primary:hover { background: #1d4ed8; }

.btn-green {
  background: var(--green);
  color: #fff;
  border-color: transparent;
  font-weight: 600;
}
.btn-green:hover { background: #15803d; }

.btn-sm { padding: 5px 10px; font-size: 12px; }

/* Inputs */
input, select {
  padding: 8px 12px;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  font-size: 13px;
  font-family: inherit;
  background: var(--surface);
  color: var(--text-primary);
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
input:focus, select:focus {
  border-color: var(--blue);
  box-shadow: var(--focus);
}
label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  display: block;
  margin-bottom: 5px;
}

/* Filter bar */
.filter-bar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 20px;
  padding: 16px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
}
.filter-bar input { width: 220px; }

/* Pipeline board */
.pipeline-board {
  display: flex;
  gap: 14px;
  overflow-x: auto;
  padding-bottom: 16px;
  padding-top: 4px;
}
.pipeline-col {
  min-width: 220px;
  flex-shrink: 0;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.pipeline-col-header {
  padding: 12px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  font-weight: 600;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.pipeline-col-count {
  background: var(--surface-2);
  color: var(--text-muted);
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 99px;
  border: 1px solid var(--border);
}
.pipeline-col-body {
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 80px;
  max-height: 480px;
  overflow-y: auto;
}
.file-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
  font-size: 12px;
}
.file-card:hover {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(37,99,235,.08);
}
.file-card:focus-visible {
  outline: none;
  box-shadow: var(--focus);
  border-color: var(--blue);
}
.file-card-no { font-weight: 700; font-size: 13px; color: var(--blue); }
.file-card-name { color: var(--text-primary); margin-top: 3px; font-weight: 500; }
.file-card-meta { color: var(--text-muted); margin-top: 6px; font-size: 11px; }
.file-card-query { margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border); }

/* Modal overlay */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px;
  width: 100%;
  max-width: 420px;
  box-shadow: var(--shadow), 0 0 0 1px rgba(0,0,0,.05);
  position: relative;
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 20px;
}
.modal-title { font-size: 17px; font-weight: 600; color: var(--text-primary); }
.modal-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.modal-close {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  padding: 4px;
  border-radius: var(--radius-sm);
  font-size: 20px;
  line-height: 1;
  display: flex;
}
.modal-close:hover { color: var(--text-primary); background: var(--surface-2); }
.modal-close:focus-visible { outline: 2px solid var(--blue); }
.field-group { margin-bottom: 14px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-muted);
}
.empty-state-icon { font-size: 32px; margin-bottom: 12px; }
.empty-state-msg { font-size: 14px; font-weight: 500; }

/* Form layout */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

/* Section page header */
.page-header {
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.page-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
}
.page-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

/* Alert banner */
.alert-banner {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 18px;
  border-radius: var(--radius);
  margin-bottom: 20px;
  font-size: 13px;
}
.alert-red {
  background: var(--red-light);
  border: 1px solid rgba(220,38,38,.2);
  color: var(--red-text);
}
.alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

/* Scrollbar styling */
.pipeline-board::-webkit-scrollbar { height: 6px; }
.pipeline-board::-webkit-scrollbar-track { background: var(--surface-2); border-radius: 3px; }
.pipeline-board::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

/* Notification toast */
#toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--text-primary);
  color: var(--bg);
  padding: 12px 18px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  z-index: 9999;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity .2s, transform .2s;
  pointer-events: none;
}
#toast.show { opacity: 1; transform: translateY(0); }

/* Visually hidden for screen readers */
.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-firestore.js"></script>
</head>
<body>

<a href="#main-content" class="skip-link">Skip to main content</a>

<header class="hdr" role="banner">
  <div class="hdr-brand">
    <div class="hdr-logo" aria-hidden="true">HO</div>
    <div>
      <div class="hdr-title">Pan-India Credit Ops</div>
      <div class="hdr-sub" id="hdr-sub" aria-live="polite" aria-atomic="true">Loading…</div>
    </div>
  </div>
  <div class="status-pill" role="status" aria-label="Database sync status">
    <span class="status-dot" aria-hidden="true"></span>
    Live sync active
  </div>
</header>

<nav class="nav-bar" role="navigation" aria-label="Dashboard sections">
  <button class="tab active" onclick="sw('dash')" data-tab="dash" aria-current="page">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    Executive summary
  </button>
  <button class="tab" onclick="sw('pipeline')" data-tab="pipeline">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M22 12H3M6 8l-4 4 4 4"/></svg>
    Pipeline
  </button>
  <button class="tab" onclick="sw('po')" data-tab="po">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    PO analytics
  </button>
  <button class="tab" onclick="sw('so')" data-tab="so">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    SO analytics
  </button>
  <button class="tab" onclick="sw('branch')" data-tab="branch">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
    Zone / branch
  </button>
  <button class="tab" onclick="sw('files')" data-tab="files">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    Master database
  </button>
  <button class="tab" onclick="sw('add')" data-tab="add">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add file
  </button>
</nav>

<main class="main" id="main-content" tabindex="-1">
  <div id="s-dash" class="sec active" role="region" aria-label="Executive summary"></div>
  <div id="s-pipeline" class="sec" role="region" aria-label="Pipeline visualizer"></div>
  <div id="s-po" class="sec" role="region" aria-label="Processing officer analytics"></div>
  <div id="s-so" class="sec" role="region" aria-label="Sanctioning officer analytics"></div>
  <div id="s-branch" class="sec" role="region" aria-label="Zone and branch matrix"></div>
  <div id="s-files" class="sec" role="region" aria-label="Master database"></div>
  <div id="s-add" class="sec" role="region" aria-label="Add new file"></div>

const STAGE_TAG={'HO FS':'tag-blue','HO IPS':'tag-purple','SUD':'tag-amber','Disbursed':'tag-teal','Sanctioned':'tag-green','Branch 3rd Party':'tag-slate','Lost Lead':'tag-red','Rejected':'tag-red'};

const STAGE_BAR={'HO FS':'#2563eb','HO IPS':'#7c3aed','SUD':'#d97706','Disbursed':'#0f766e','Sanctioned':'#16a34a','Branch 3rd Party':'#64748b','Lost Lead':'#dc2626','Rejected':'#dc2626','Unknown':'#cbd5e1'};
const QS_BAR={'Pending with Branch':'#dc2626','Pending with HO':'#7c3aed','Sanctioned':'#16a34a','Clear':'#16a34a','Rejected':'#dc2626','Not Set':'#94a3b8','PUT UP FOR SANCTION':'#d97706'};

function parseDate(s){
  if(!s||s==='')return null;
  if(typeof s==='number')return new Date((s-25569)*86400000);
  s=String(s).trim();
  const m=s.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{2,4})$/);
  if(m){const y=m[3].length===2?'20'+m[3]:m[3];return new Date(y+'-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0'));}
  try{const d=new Date(s);if(!isNaN(d))return d;}catch(e){}
  return null;
}
function daysSince(d){if(!d)return null;return Math.max(0,Math.floor((TODAY-d)/86400000));}
function tatLabel(days){
  if(days===null)return'-';
  if(days<=7)return'On Track';
  if(days<=15)return'Watch';
  return'Overdue';
}
function normalizeStage(s){
  if(!s||s.trim()==='')return'Unknown';
  s=s.trim().toUpperCase();
  if(s.includes('HO IPS')||s.includes('HOIPS'))return'HO IPS';
  if(s.includes('HO FS'))return'HO FS';
  if(s.includes('PUT UP TO HO SO'))return'Put up to HO SO FS';
  if(s==='SUD')return'SUD';
  if(s.includes('DISBURS'))return'Disbursed';
  if(s.includes('SANCTION'))return'Sanctioned';
  if(s.includes('BRANCH 3RD')||s.includes('B3P'))return'Branch 3rd Party';
  if(s.includes('LOST'))return'Lost Lead';
  if(s.includes('REJECT'))return'Rejected';
  return s.charAt(0)+s.slice(1).toLowerCase();
}
function normalizeQuery(s){
  if(!s||s.trim()==='')return'Not Set';
  s=s.trim().toUpperCase();
  if(s.includes('BRANCH'))return'Pending with Branch';
  if(s.includes('HO')||s.includes('PENDING WITH H'))return'Pending with HO';
  if(s.includes('SANCTION'))return'Sanctioned';
  if(s.includes('REJECT'))return'Rejected';
  if(s.includes('PUT UP FOR SANCTION'))return'PUT UP FOR SANCTION';
  if(s==='CLEAR')return'Clear';
  return s.charAt(0)+s.slice(1).toLowerCase();
}
function fmtAmt(a){return a?'₹'+(a/100000).toFixed(1)+'L':'—';}
function stageTag(s){return`<span class="tag ${STAGE_TAG[s]||'tag-slate'}">${s||'—'}</span>`;}
function qTag(q){return`<span class="tag ${QS_TAG[q]||'tag-slate'}">${q||'—'}</span>`;}
function tatSpan(t,d){
  const cls=t==='On Track'?'tat-ok':t==='Watch'?'tat-watch':'tat-over';
  return`<span class="tat ${cls}">${t} · ${d??'—'}d</span>`;
}
function bar(lbl,val,max,color,sfx=''){
  const pct=max?Math.round(val/max*100):0;
  return`<div class="bar-row">
    <div class="bar-label" title="${lbl}">${lbl}</div>
    <div class="bar-track" role="progressbar" aria-valuenow="${val}" aria-valuemax="${max}" aria-label="${lbl}: ${val}">
      <div class="bar-fill" style="width:${pct}%;background:${color}"></div>
    </div>
    <div class="bar-count">${val}${sfx}</div>
  </div>`;
}

function showToast(msg, isError){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=isError?'var(--red)':'var(--text-primary)';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

db.collection("credit_files").onSnapshot((snapshot)=>{
  if(snapshot.empty&&RAW.length>0){
    let batch=db.batch();
    RAW.forEach(r=>{
      let ref=db.collection("credit_files").doc();
      batch.set(ref,{sno:String(r[0]),dateStr:r[1],fileNo:r[2],name:r[3],amt:Number(r[4])||0,branch:r[5],stage:normalizeStage(r[6]),query:normalizeQuery(r[7]),po:r[8]||'',so:r[9]||''});
    });
    batch.commit();
    return;
  }
  FILES=[];
  snapshot.forEach(doc=>{
    const f=doc.data();f.id=doc.id;f.date=parseDate(f.dateStr);f.days=daysSince(f.date);f.tat=tatLabel(f.days);
    FILES.push(f);
  });
  POS=[...new Set(FILES.map(f=>f.po).filter(x=>x))].sort();
  SOS=[...new Set(FILES.map(f=>f.so).filter(x=>x))].sort();
  BRANCHES=[...new Set(FILES.map(f=>f.branch).filter(x=>x))].sort();
  fileFiltersBuilt=false;
  const activeTab=document.querySelector('.tab.active');
  if(activeTab){
    const t=activeTab.dataset.tab;
    if(t==='dash')renderDash();
    else if(t==='pipeline')renderPipeline();
    else if(t==='po')renderPO();
    else if(t==='so')renderSO();
    else if(t==='branch')renderBranch();
    else if(t==='files'){buildFileFilters();renderFiles();}
  }
  const total=FILES.length;
  const totalAmt=FILES.reduce((s,f)=>s+f.amt,0);
  document.getElementById('hdr-sub').textContent=`${total} files · ₹${(totalAmt/10000000).toFixed(1)}Cr pipeline`;
});

function sw(id){
  document.querySelectorAll('.tab').forEach(t=>{ t.classList.toggle('active',t.dataset.tab===id); t.setAttribute('aria-current',t.dataset.tab===id?'page':'false'); });
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-'+id).classList.add('active');

}

}

}

function renderBranch(){
  const brData=BRANCHES.map(br=>{
    const bf=FILES.filter(f=>f.branch===br);
    const sanc=bf.filter(f=>f.query==='Sanctioned'||f.stage==='Sanctioned'||f.stage==='Disbursed').length;
    const pendB=bf.filter(f=>f.query==='Pending with Branch').length;
    const pendH=bf.filter(f=>f.query==='Pending with HO').length;
    const avgDays=bf.length?Math.round(bf.reduce((s,f)=>s+(f.days||0),0)/bf.length):0;
    const totalAmt=bf.reduce((s,f)=>s+f.amt,0);
    const sanctAmt=bf.filter(f=>f.query==='Sanctioned'||f.stage==='Sanctioned').reduce((s,f)=>s+f.amt,0);
    return{br,total:bf.length,sanc,pendB,pendH,avgDays,totalAmt,sanctAmt};
  }).sort((a,b)=>b.total-a.total);
  const maxTotal=Math.max(...brData.map(p=>p.total),1);
  const maxSanc=Math.max(...brData.map(p=>p.sanc),1);
  const maxAmt=Math.max(...brData.map(p=>p.totalAmt),1);

  document.getElementById('s-branch').innerHTML=`
    <div class="page-header"><div><h1 class="page-title">Zone / branch matrix</h1><p class="page-subtitle">Territory-level login and sanction breakdown</p></div></div>
    <div class="grid-2">
      <div class="card"><h2 class="card-title">Login volume</h2><div class="bar-group">${brData.map(p=>bar(p.br,p.total,maxTotal,STAGE_BAR['HO FS'])).join('')||noData()}</div></div>
      <div class="card"><h2 class="card-title">Sanction volume</h2><div class="bar-group">${brData.map(p=>bar(p.br,p.sanc,maxSanc,'#16a34a')).join('')||noData()}</div></div>
    </div>
    <div class="card" style="margin-bottom:20px"><h2 class="card-title">Total book value (₹Cr)</h2><div class="bar-group">${brData.map(p=>bar(p.br,+(p.totalAmt/10000000).toFixed(1),maxAmt/10000000,'#7c3aed','Cr')).join('')||noData()}</div></div>
    <div class="card">
      <h2 class="card-title">Territory performance matrix</h2>
      <div class="table-wrap">
        <table aria-label="Territory performance matrix">
          <thead><tr><th scope="col">Zone / branch</th><th scope="col">Logins</th><th scope="col">Sanctioned</th><th scope="col">Conversion</th><th scope="col">Pending branch</th><th scope="col">Pending HO</th><th scope="col">Avg TAT</th><th scope="col">Total book</th><th scope="col">Sanctioned value</th></tr></thead>
          <tbody>${brData.map(p=>`<tr>
            <td><strong>${p.br}</strong></td><td>${p.total}</td>
            <td style="color:var(--green);font-weight:600">${p.sanc}</td>
            <td>${p.total?Math.round(p.sanc/p.total*100):0}%</td>
            <td style="color:var(--red)">${p.pendB}</td>
            <td style="color:var(--purple)">${p.pendH}</td>
            <td><span class="tat ${p.avgDays>15?'tat-over':p.avgDays>7?'tat-watch':'tat-ok'}">${p.avgDays}d</span></td>
            <td>${(p.totalAmt/10000000).toFixed(1)}Cr</td>
            <td style="color:var(--teal);font-weight:600">${(p.sanctAmt/10000000).toFixed(1)}Cr</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
    </div>`;
}

function buildFileFilters(){
  if(fileFiltersBuilt)return; fileFiltersBuilt=true;
  const map={
    'ff-branch':BRANCHES,'ff-po':POS,'ff-so':SOS,
    'ff-stage':STAGES,'ff-query':QS_LIST
  };
  Object.entries(map).forEach(([id,opts])=>{
    const sel=document.getElementById(id);
    if(!sel)return;
    const firstOpt=sel.options[0];
    sel.innerHTML='';
    sel.appendChild(firstOpt);
    opts.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;sel.appendChild(o);});
  });
}

function renderFiles(){
  const br=document.getElementById('ff-branch')?.value||'';
  const po=document.getElementById('ff-po')?.value||'';
  const so=document.getElementById('ff-so')?.value||'';
  const st=document.getElementById('ff-stage')?.value||'';
  const qu=document.getElementById('ff-query')?.value||'';
  const srch=(document.getElementById('ff-search')?.value||'').toLowerCase();
  const filt=FILES.filter(f=>(!br||f.branch===br)&&(!po||f.po===po)&&(!so||f.so===so)&&(!st||f.stage===st)&&(!qu||f.query===qu)&&(!srch||(f.name.toLowerCase().includes(srch)||f.fileNo.toLowerCase().includes(srch))));
  const tbody=document.getElementById('files-tbody');
  if(tbody)tbody.innerHTML=filt.length?filt.map(f=>`<tr>
    <td><strong style="color:var(--blue);font-size:13px">${f.fileNo}</strong></td>
    <td style="font-weight:500">${f.name}</td><td>${f.branch}</td>
    <td style="font-weight:600">${fmtAmt(f.amt)}</td>
    <td>${f.po||'—'}</td><td>${f.so||'—'}</td>
    <td>${stageTag(f.stage)}</td><td>${qTag(f.query)}</td>
    <td>${tatSpan(f.tat,f.days)}</td>
    <td><button class="btn btn-sm" onclick="openModal(${FILES.indexOf(f)})" aria-label="Edit file ${f.fileNo}">Edit</button></td>
  </tr>`).join(''):`<tr><td colspan="10" style="text-align:center;color:var(--text-muted);padding:40px">No records match the current filters</td></tr>`;
  const cnt=document.getElementById('files-count');
  if(cnt)cnt.textContent=`${filt.length} of ${FILES.length} records`;
}

function renderAdd(){
  const poOpts=POS.map(p=>`<option>${p}</option>`).join('');
  const soOpts=SOS.map(s=>`<option>${s}</option>`).join('');
  const brOpts=BRANCHES.map(b=>`<option>${b}</option>`).join('');
  document.getElementById('s-add').innerHTML=`
    <div style="max-width:680px">
      <div class="page-header">
        <div><h1 class="page-title">Add new file</h1><p class="page-subtitle">Log a new file received from the branch network</p></div>

          <div class="field-group"><label for="a-fileseq">File no. (last 2 digits) <span aria-label="required" style="color:var(--red)">*</span></label><input id="a-fileseq" type="text" maxlength="2" placeholder="e.g. 45" style="width:100%" autocomplete="off"></div>
          <div class="field-group"><label for="a-name">Applicant name <span aria-label="required" style="color:var(--red)">*</span></label><input id="a-name" placeholder="Full name" style="width:100%" autocomplete="off"></div>
          <div class="field-group"><label for="a-amt">Loan amount (₹)</label><input id="a-amt" type="number" placeholder="e.g. 3500000" style="width:100%"></div>
          <div class="field-group"><label for="a-branch">Territory / branch <span aria-label="required" style="color:var(--red)">*</span></label><select id="a-branch" style="width:100%"><option value="">Select territory</option>${brOpts}</select></div>
          <div class="field-group"><label for="a-date">Ingestion date</label><input id="a-date" type="date" style="width:100%"></div>
          <div class="field-group"><label for="a-po">Processing officer <span aria-label="required" style="color:var(--red)">*</span></label><select id="a-po" style="width:100%"><option value="">Assign PO</option>${poOpts}</select></div>
          <div class="field-group"><label for="a-so">Sanctioning officer</label><select id="a-so" style="width:100%"><option value="">Assign SO</option>${soOpts}</select></div>
          <div class="field-group"><label for="a-stage">Workflow stage</label><select id="a-stage" style="width:100%"><option>HO FS</option><option>HO IPS</option><option>SUD</option><option>Branch 3rd Party</option></select></div>
          <div class="field-group"><label for="a-query">Query status</label><select id="a-query" style="width:100%"><option>Not Set</option><option>Pending with Branch</option><option>Pending with HO</option><option>Clear</option></select></div>
        </div>
        <div style="display:flex;gap:12px;margin-top:24px;align-items:center">
          <button class="btn btn-primary" onclick="addFile()">Add file</button>
          <button class="btn" onclick="document.querySelectorAll('#s-add input,#s-add select').forEach(e=>e.value='')">Clear form</button>
          <span id="add-msg" role="status" aria-live="polite" style="font-size:13px;font-weight:500"></span>
        </div>
      </div>
    </div>`;
}

function addFile(){
  const brNum=document.getElementById('a-brnum').value.trim();
  const fSeq=document.getElementById('a-fileseq').value.trim();
  const nm=document.getElementById('a-name').value.trim();
  const br=document.getElementById('a-branch').value;
  const po=document.getElementById('a-po').value;
  const msg=document.getElementById('add-msg');
  if(!brNum||!fSeq||!nm||!br||!po){
    msg.textContent='Please fill in all required fields.';
    msg.style.color='var(--red)';
    return;
  }
  const fn=String(brNum)+String(fSeq);
  const dt=document.getElementById('a-date').value||new Date().toISOString().split('T')[0];
  db.collection("credit_files").add({
    sno:String(FILES.length+1),dateStr:dt,fileNo:fn,name:nm,
    amt:Number(document.getElementById('a-amt').value)||0,branch:br,
    stage:document.getElementById('a-stage').value,query:document.getElementById('a-query').value,
    po:po,so:document.getElementById('a-so').value
  }).then(()=>{
    document.querySelectorAll('#s-add input,#s-add select').forEach(e=>e.value='');
    msg.textContent='';
    showToast(`File ${fn} added successfully`);
  }).catch(()=>{ msg.textContent='Error saving file. Please try again.'; msg.style.color='var(--red)'; });
}

function openModal(idx){
  editIdx=idx; const f=FILES[idx];
  document.getElementById('modal-title').textContent=`Edit: ${f.name}`;
  document.getElementById('modal-subtitle').textContent=`File no. ${f.fileNo} · ${f.branch}`;
  document.getElementById('m-stage').value=f.stage;
  document.getElementById('m-query').value=f.query;
  const mpo=document.getElementById('m-po');
  mpo.innerHTML=POS.map(p=>`<option${p===f.po?' selected':''}>${p}</option>`).join('');
  const mso=document.getElementById('m-so');
  mso.innerHTML=['—',...SOS].map(s=>`<option${s===f.so?' selected':''}>${s}</option>`).join('');
  document.getElementById('modal').classList.add('open');
  document.getElementById('modal').querySelector('select').focus();
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  editIdx=null;
}
function saveModal(){
  if(editIdx===null)return;
  const docId=FILES[editIdx].id;
  const sv=document.getElementById('m-so').value;
  db.collection("credit_files").doc(docId).update({
    stage:normalizeStage(document.getElementById('m-stage').value),
    query:normalizeQuery(document.getElementById('m-query').value),
    po:document.getElementById('m-po').value,
    so:sv==='—'?'':sv
  }).then(()=>{closeModal();showToast('File record updated');});
}

function downloadCSV(){
  if(!FILES.length){showToast('No data to export',true);return;}
  const headers=["File No","Customer Name","Zone/Branch","Loan Amount","PO","SO","Stage","Query Status","Days","TAT"];
  const rows=FILES.map(f=>[f.fileNo,`"${f.name}"`,`"${f.branch}"`,f.amt,`"${f.po}"`,`"${f.so}"`,f.stage,f.query,f.days,f.tat]);
  const csv="data:text/csv;charset=utf-8,"+[headers.join(","),...rows.map(e=>e.join(","))].join("\n");
  const link=document.createElement("a");
  link.setAttribute("href",encodeURI(csv));
  link.setAttribute("download",`CreditOps_Export_${new Date().toISOString().split('T')[0]}.csv`);
  document.body.appendChild(link);link.click();document.body.removeChild(link);
  showToast('CSV exported');
}

document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
