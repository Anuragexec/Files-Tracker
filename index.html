* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; font-size: 13px; color: #1e293b; background: #f8fafc; }

/* Header & Navigation */
.hdr { padding: 16px 24px; background: #ffffff; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05); }
.hdr h1 { font-size: 18px; font-weight: 600; color: #0f172a; }
.hdr p { font-size: 12px; color: #64748b; margin-top: 4px; }
.tabs { display: flex; gap: 8px; padding: 12px 24px; background: #ffffff; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 20; overflow-x: auto; }
.tab { padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer; border-radius: 6px; color: #64748b; white-space: nowrap; transition: all 0.2s ease; }
.tab:hover { background: #f1f5f9; color: #0f172a; }
.tab.active { background: #3b82f6; color: #ffffff; }

/* Layout & Cards */
.sec { display: none; padding: 24px; max-width: 1400px; margin: 0 auto; }
.sec.active { display: block; }
.card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1); }
.card h3 { font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em; }

/* Top Metrics */
.metrics { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 20px; }
.mc { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px; box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1); border-left: 4px solid #3b82f6; }
.mc .lbl { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; font-weight: 600; }
.mc .val { font-size: 24px; font-weight: 600; color: #0f172a; }
.mc .sub { font-size: 11px; color: #94a3b8; margin-top: 4px; }

/* Grids */
.two { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.three { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }

/* Bars */
.bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.bar-lbl { font-size: 12px; width: 130px; text-align: right; flex-shrink: 0; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-wrap { flex: 1; background: #f1f5f9; border-radius: 999px; height: 12px; overflow: hidden; }
.bar-fill { height: 12px; border-radius: 999px; transition: width 0.4s ease; }
.bar-num { font-size: 12px; width: 35px; flex-shrink: 0; font-weight: 600; color: #475569; }

/* Tables */
table { width: 100%; border-collapse: separate; border-spacing: 0; }
th { font-size: 11px; font-weight: 600; text-align: left; padding: 12px 16px; color: #64748b; background: #f8fafc; border-bottom: 1px solid #e2e8f0; border-top: 1px solid #e2e8f0; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
th:first-child { border-left: 1px solid #e2e8f0; border-top-left-radius: 8px; }
th:last-child { border-right: 1px solid #e2e8f0; border-top-right-radius: 8px; }
td { padding: 12px 16px; border-bottom: 1px solid #e2e8f0; vertical-align: middle; color: #334155; font-size: 12px; }
tr:hover td { background: #f8fafc; }

/* Tags & Colors */
.tag { display: inline-block; font-size: 11px; padding: 4px 8px; border-radius: 6px; font-weight: 600; white-space: nowrap; border: 1px solid transparent; }
.t-hofs { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
.t-hoips { background: #f5f3ff; color: #6d28d9; border-color: #ddd6fe; }
.t-sud { background: #fef3c7; color: #b45309; border-color: #fde68a; }
.t-sanc { background: #dcfce7; color: #15803d; border-color: #bbf7d0; }
.t-disb { background: #ccfbf1; color: #0f766e; border-color: #99f6e4; }
.t-b3p { background: #f1f5f9; color: #475569; border-color: #cbd5e1; }
.t-ll, .t-rej { background: #fee2e2; color: #b91c1c; border-color: #fecaca; }
.t-unk { background: #f8fafc; color: #64748b; border-color: #e2e8f0; }

.tat-done { color: #15803d; font-weight: 600; background: #dcfce7; padding: 2px 6px; border-radius: 4px; }
.tat-on { color: #0f766e; background: #ccfbf1; padding: 2px 6px; border-radius: 4px; }
.tat-watch { color: #b45309; font-weight: 600; background: #fef3c7; padding: 2px 6px; border-radius: 4px; }
.tat-over { color: #b91c1c; font-weight: 600; background: #fee2e2; padding: 2px 6px; border-radius: 4px; }

/* Buttons & Inputs */
.frow { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.frow select, .frow input, .fg input, .fg select { padding: 8px 12px; border-radius: 6px; border: 1px solid #cbd5e1; font-family: inherit; font-size: 13px; color: #1e293b; background: #ffffff; outline: none; transition: border-color 0.2s; }
.frow select:focus, .frow input:focus, .fg input:focus, .fg select:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.1); }
.btn { padding: 8px 16px; border-radius: 6px; border: 1px solid #cbd5e1; background: #ffffff; color: #334155; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; font-family: inherit; }

function parseDate(s){
  if(!s||s==='')return null;
  if(typeof s==='number'){return new Date((s-25569)*86400000);}
  s=String(s).trim();
  if(s==='46185'||s==='46361'){return new Date('2026-06-16');} // Quick catch for excel numeric dates
  let m;

}

  if(s.includes('LOST'))return'Lost Lead';
  if(s.includes('REJECT'))return'Rejected';
  return s.charAt(0)+s.slice(1).toLowerCase();
}

function normalizeQuery(s){

  if(s==='CLEAR')return'Clear';
  return s.charAt(0)+s.slice(1).toLowerCase();
}

let FILES = [];
let POS = [];
let SOS = [];
let BRANCHES = [];

const STAGES_LIST=['HO FS','HO IPS','SUD','Disbursed','Sanctioned','Branch 3rd Party','Lost Lead','Rejected','Unknown'];
const QS_LIST=['Pending with Branch','Pending with HO','Sanctioned','Rejected','Clear','Not Set','PUT UP FOR SANCTION'];

const STAGE_COL={'HO FS':'t-hofs','HO IPS':'t-hoips','SUD':'t-sud','Disbursed':'t-disb','Sanctioned':'t-sanc','Branch 3rd Party':'t-b3p','Lost Lead':'t-ll','Rejected':'t-rej'};
const QS_COL={'Pending with Branch':'t-pb','Pending with HO':'t-ph','Sanctioned':'t-cl','Clear':'t-cl','Rejected':'t-rej'};

let editIdx=null;
let fileFiltersBuilt=false;

// LISTEN TO FIREBASE REAL-TIME
db.collection("credit_files").onSnapshot((snapshot) => {
    if (snapshot.empty && RAW.length > 0) {
        let batch = db.batch();
        RAW.forEach(r => {
            let docRef = db.collection("credit_files").doc();
            batch.set(docRef, {
                sno: String(r[0]), dateStr: r[1], fileNo: r[2], name: r[3],
                amt: Number(r[4])||0, branch: r[5],
                stage: normalizeStage(r[6]), query: normalizeQuery(r[7]),
                po: r[8]||'', so: r[9]||''
            });
        });
        batch.commit().then(() => console.log("Sync complete!"));
        return;
    }

    FILES = [];
    snapshot.forEach(doc => {
        let f = doc.data();
        f.id = doc.id; 
        f.date = parseDate(f.dateStr);
        f.days = daysSince(f.date);
        f.tat = tatLabel(f.days);
        FILES.push(f);
    });

    POS=[...new Set(FILES.map(f=>f.po).filter(x=>x))].sort();
    SOS=[...new Set(FILES.map(f=>f.so).filter(x=>x))].sort();
    BRANCHES=[...new Set(FILES.map(f=>f.branch).filter(x=>x))].sort();

    fileFiltersBuilt = false;
    const activeTab = document.querySelector('.tab.active');
    if (activeTab) {
        const tabText = activeTab.textContent.toLowerCase();
        if(tabText.includes('dash')) renderDash();
        else if(tabText.includes('pipeline')) renderPipeline();
        else if(tabText.includes('po')) renderPO();
        else if(tabText.includes('so')) renderSO();
        else if(tabText.includes('branch')) renderBranch();
        else if(tabText.includes('files')) { buildFileFilters(); renderFiles(); }
    }
});


function sc(cls){return`<span class="tag ${cls||'t-unk'}">`}
function stageTag(s){return`${sc(STAGE_COL[s]||'t-unk')}${s||'—'}</span>`}
function qTag(q){return`${sc(QS_COL[q]||'')}${q||'—'}</span>`}
function fmtAmt(a){return a?'₹'+(a/100000).toFixed(1)+'L':'—'}
function tatSpan(t,d){
  const cls=t==='On Track'?'tat-on':t==='Watch'?'tat-watch':(t==='Overdue'||t==='Critical')?'tat-over':'tat-done';
  return`<span class="${cls}">${t} (${d??'—'}d)</span>`;
}

function bar(lbl,val,max,color,sfx=''){
  const pct=max?Math.round(val/max*100):0;
  return`<div class="bar-row"><div class="bar-lbl" title="${lbl}">${lbl}</div><div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div><div class="bar-num">${val}${sfx}</div></div>`;
}

function sw(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['dash','pipeline','po','so','branch','files','add'][i]===id));
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-'+id).classList.add('active');
  const fn={dash:renderDash,pipeline:renderPipeline,po:renderPO,so:renderSO,branch:renderBranch,files:()=>{buildFileFilters();renderFiles();},add:renderAdd};
  if(fn[id])fn[id]();
}

function renderDash(){
  const total=FILES.length;
  const sanc=FILES.filter(f=>f.query==='Sanctioned'||f.stage==='Sanctioned'||f.stage==='Disbursed').length;
  const pendB=FILES.filter(f=>f.query==='Pending with Branch').length;
  const pendH=FILES.filter(f=>f.query==='Pending with HO').length;
  const totalAmt=FILES.reduce((s,f)=>s+f.amt,0);
  const avgAmt=total?Math.round(totalAmt/total/100000):0;

  let html=`<div class="metrics">
    <div class="mc"><div class="lbl">Total logins</div><div class="val">${total}</div><div class="sub">Current Active</div></div>
    <div class="mc"><div class="lbl">Sanctioned</div><div class="val" style="color:#15803d">${sanc}</div><div class="sub">${Math.round(sanc/total*100)}% rate</div></div>
    <div class="mc"><div class="lbl">Pending — Branch</div><div class="val" style="color:#b91c1c">${pendB}</div><div class="sub">needs branch reply</div></div>
    <div class="mc"><div class="lbl">Pending — HO</div><div class="val" style="color:#1d4ed8">${pendH}</div><div class="sub">needs HO action</div></div>
    <div class="mc"><div class="lbl">Avg loan size</div><div class="val">₹${avgAmt}L</div><div class="sub">₹${(totalAmt/10000000).toFixed(1)}Cr total book</div></div>
  </div>`;

  const stageCounts={};STAGES_LIST.forEach(s=>stageCounts[s]=FILES.filter(f=>f.stage===s).length);
  const maxS=Math.max(...Object.values(stageCounts),1);
  const sCols={'HO FS':'#3b82f6','HO IPS':'#6366f1','SUD':'#f59e0b','Disbursed':'#10b981','Sanctioned':'#22c55e','Branch 3rd Party':'#94a3b8','Lost Lead':'#ef4444','Rejected':'#dc2626','Unknown':'#cbd5e1'};
  let stageBars=STAGES_LIST.filter(s=>stageCounts[s]>0).map(s=>bar(s,stageCounts[s],maxS,sCols[s])).join('');

  const qCounts={};QS_LIST.forEach(q=>qCounts[q]=FILES.filter(f=>f.query===q).length);
  const maxQ=Math.max(...Object.values(qCounts),1);
  const qCols={'Pending with Branch':'#ea580c','Pending with HO':'#4f46e5','Sanctioned':'#65a30d','Clear':'#059669','Rejected':'#e11d48','Not Set':'#94a3b8','PUT UP FOR SANCTION':'#d97706'};
  let qBars=QS_LIST.filter(q=>qCounts[q]>0).map(q=>bar(q,qCounts[q],maxQ,qCols[q])).join('');

  const tatC={Critical:0,Overdue:0,Watch:0,'On Track':0};
  FILES.forEach(f=>{if(f.tat&&tatC[f.tat]!==undefined)tatC[f.tat]++;});
  const maxT=Math.max(...Object.values(tatC),1);
  const tCols={Critical:'#b91c1c',Overdue:'#ea580c',Watch:'#f59e0b','On Track':'#65a30d'};
  let tatBars=Object.entries(tatC).filter(([,v])=>v>0).map(([k,v])=>bar(k,v,maxT,tCols[k])).join('');

  html+=`<div class="three">
    <div class="card"><h3>Stage distribution</h3>${stageBars}</div>
    <div class="card"><h3>Query status</h3>${qBars}</div>
    <div class="card"><h3>TAT status</h3>${tatBars}<div style="font-size:10px;color:var(--color-text-secondary);margin-top:6px">Watch=8-15d · Overdue=16-30d · Critical>30d</div></div>
  </div>`;

  const pend=FILES.filter(f=>f.query==='Pending with Branch'||f.query==='Pending with HO').sort((a,b)=>(b.days||0)-(a.days||0));
  html+=`<div class="card" style="margin-top:0"><h3>🔴 Action required (${pend.length} files) — sorted by days pending</h3>
  <table><thead><tr><th>File No</th><th>Customer</th><th>Branch</th><th>Loan</th><th>PO</th><th>Stage</th><th>Query pending with</th><th>Days at hub</th></tr></thead><tbody>
  ${pend.map(f=>`<tr><td style="font-weight:500;font-size:11px">${f.fileNo}</td><td>${f.name}</td><td>${f.branch}</td><td>${fmtAmt(f.amt)}</td><td>${f.po||'—'}</td><td>${stageTag(f.stage)}</td><td>${qTag(f.query)}</td><td>${tatSpan(f.tat,f.days)}</td></tr>`).join('')}
  </tbody></table></div>`;

  document.getElementById('s-dash').innerHTML=html;
  document.getElementById('hdr-sub').textContent=`${total} files · ₹${(totalAmt/10000000).toFixed(1)}Cr pipeline · Real-time Sync`;
}

  ${brData.map(p=>`<tr><td style="font-weight:600">${p.br}</td><td>${p.total}</td><td style="color:#15803d;font-weight:600">${p.sanc}</td><td>${p.total?Math.round(p.sanc/p.total*100):0}%</td><td style="color:#b91c1c">${p.pendB}</td><td style="color:#1d4ed8">${p.pendH}</td><td class="${p.avgDays>20?'tat-over':p.avgDays>10?'tat-watch':'tat-on'}">${p.avgDays}d</td><td>${(p.totalAmt/10000000).toFixed(1)}Cr</td><td>${(p.sanctAmt/10000000).toFixed(1)}Cr</td></tr>`).join('')}
  </tbody></table></div>`;
  document.getElementById('s-branch').innerHTML=html;
}

function buildFileFilters(){
  if(fileFiltersBuilt)return;fileFiltersBuilt=true;
  ['ff-branch','ff-po','ff-so','ff-stage','ff-query'].forEach(id=>{
    const sel=document.getElementById(id);
    if(!sel)return;
    sel.innerHTML = `<option value="">All ${id.split('-')[1]}s</option>`;
    const opts={
      'ff-branch':BRANCHES,'ff-po':POS,'ff-so':SOS,
      'ff-stage':STAGES_LIST,'ff-query':QS_LIST
    };
    (opts[id]||[]).forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;sel.appendChild(o);});
  });
}

function renderFiles(){
  const br=document.getElementById('ff-branch')?.value||'';
  const po=document.getElementById('ff-po')?.value||'';
  const so=document.getElementById('ff-so')?.value||'';
  const st=document.getElementById('ff-stage')?.value||'';
  const qu=document.getElementById('ff-query')?.value||'';
  const srch=(document.getElementById('ff-search')?.value||'').toLowerCase();
  const filt=FILES.filter(f=>
    (!br||f.branch===br)&&(!po||f.po===po)&&(!so||f.so===so)&&
    (!st||f.stage===st)&&(!qu||f.query===qu)&&
    (!srch||(f.name.toLowerCase().includes(srch)||f.fileNo.toLowerCase().includes(srch)))
  );
  const tbody=document.getElementById('files-tbody');
  if(tbody)tbody.innerHTML=filt.map((f,i)=>`<tr>
    <td style="font-size:11px;font-weight:600">${f.fileNo}</td>
    <td>${f.name}</td><td>${f.branch}</td>
    <td style="font-weight:500">${fmtAmt(f.amt)}</td>
    <td>${f.po||'—'}</td><td>${f.so||'—'}</td>
    <td>${stageTag(f.stage)}</td>
    <td>${qTag(f.query)}</td>
    <td>${tatSpan(f.tat,f.days)}</td>
    <td><button class="btn" style="font-size:11px;padding:6px 12px" onclick="openModal(${FILES.indexOf(f)})">Edit</button></td>
  </tr>`).join('')||'<tr><td colspan="10" style="text-align:center;color:#94a3b8;padding:24px">No files match criteria</td></tr>';
  const cnt=document.getElementById('files-count');
  if(cnt)cnt.textContent=`${filt.length} of ${FILES.length} files`;
}

function renderAdd(){
  const poOpts=POS.map(p=>`<option>${p}</option>`).join('');
  const soOpts=SOS.map(s=>`<option>${s}</option>`).join('');
  const brOpts=BRANCHES.map(b=>`<option>${b}</option>`).join('');
  document.getElementById('s-add').innerHTML=`
  <div class="card" style="max-width:800px;margin:0 auto">
  <p style="font-size:13px;color:#64748b;margin-bottom:20px;font-weight:500">Add new file login from branch</p>
  <div class="three" style="gap:20px">
    <div class="fg"><label>File No *</label><input id="a-fileno" placeholder="e.g. DL0110020000099"></div>
    <div class="fg"><label>Customer Name *</label><input id="a-name" placeholder="Full name"></div>
    <div class="fg"><label>Loan Amount (₹)</label><input id="a-amt" type="number" placeholder="e.g. 3500000"></div>
    <div class="fg"><label>Branch *</label><select id="a-branch"><option value="">Select branch</option>${brOpts}<option value="__new__">+ Other</option></select></div>
    <div class="fg"><label>Date Received</label><input id="a-date" type="date"></div>
    <div class="fg"><label>PO Name *</label><select id="a-po"><option value="">Select PO</option>${poOpts}</select></div>
    <div class="fg"><label>SO Name</label><select id="a-so"><option value="">Select SO</option>${soOpts}</select></div>
    <div class="fg"><label>Current Stage</label><select id="a-stage"><option>HO FS</option><option>HO IPS</option><option>SUD</option><option>Branch 3rd Party</option></select></div>
    <div class="fg"><label>Query Status</label><select id="a-query"><option>Not Set</option><option>Pending with Branch</option><option>Pending with HO</option><option>Clear</option></select></div>
  </div>
  <div style="display:flex;gap:12px;margin-top:24px"><button class="btn pri" onclick="addFile()">Add file</button><button class="btn" onclick="document.getElementById('s-add').querySelectorAll('input,select').forEach(e=>e.value='')">Clear</button></div>
  <p id="add-msg" style="font-size:12px;margin-top:12px;font-weight:500"></p>
  </div>`;
}

// ADD FILE TO FIREBASE
function addFile(){
  const fn=document.getElementById('a-fileno').value.trim();
  const nm=document.getElementById('a-name').value.trim();
  const br=document.getElementById('a-branch').value;
  const po=document.getElementById('a-po').value;
  if(!fn||!nm||!br||!po){
      document.getElementById('add-msg').textContent='Please fill required fields (*).';
      document.getElementById('add-msg').style.color='#b91c1c';
      return;
  }
  const dt=document.getElementById('a-date').value||new Date().toISOString().split('T')[0];
  
  db.collection("credit_files").add({
    sno: String(FILES.length+1),
    dateStr: dt,
    fileNo: fn,
    name: nm,
    amt: Number(document.getElementById('a-amt').value)||0,
    branch: br,
    stage: document.getElementById('a-stage').value,
    query: document.getElementById('a-query').value,
    po: po,
    so: document.getElementById('a-so').value
  }).then(() => {
    document.getElementById('add-msg').textContent=`✓ File ${fn} added successfully.`;
    document.getElementById('add-msg').style.color='#15803d';
    document.getElementById('s-add').querySelectorAll('input,select').forEach(e=>e.value='');
  });
}

function openModal(idx){
  editIdx=idx;const f=FILES[idx];
  document.getElementById('modal-title').textContent=`Update: ${f.name}`;
  document.getElementById('m-stage').value=f.stage;
  document.getElementById('m-query').value=f.query;
  const mpo=document.getElementById('m-po');mpo.innerHTML=POS.map(p=>`<option${p===f.po?' selected':''}>${p}</option>`).join('');
  const mso=document.getElementById('m-so');mso.innerHTML=['—',...SOS].map(s=>`<option${s===f.so?' selected':''}>${s}</option>`).join('');
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');editIdx=null;}

// UPDATE EXISTING FILE IN FIREBASE
function saveModal(){
  if(editIdx===null)return;
  
  const docId = FILES[editIdx].id;
  const sv=document.getElementById('m-so').value;
  
  db.collection("credit_files").doc(docId).update({
      stage: normalizeStage(document.getElementById('m-stage').value),
      query: normalizeQuery(document.getElementById('m-query').value),
      po: document.getElementById('m-po').value,
      so: sv==='—'?'':sv
  }).then(() => {
      closeModal();
  });
}

// 6. DOWNLOAD DATA AS CSV
function downloadCSV() {
    if (FILES.length === 0) {
        alert("No data available to download.");
        return;
    }
    const headers = ["File No", "Customer Name", "Branch", "Loan Amount", "PO Name", "SO Name", "Stage", "Query Status", "Days at Hub", "TAT Status"];
    const rows = FILES.map(f => [
        f.fileNo,
        `"${f.name}"`, 
        `"${f.branch}"`,
        f.amt,
        `"${f.po}"`,
        `"${f.so}"`,
        f.stage,
        f.query,
        f.days,
        f.tat
    ]);
    const csvContent = "data:text/csv;charset=utf-8," 
        + [headers.join(","), ...rows.map(e => e.join(","))].join("\n");
        
    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    
    const todayStr = new Date().toISOString().split('T')[0];
    link.setAttribute("download", `CreditOps_Export_${todayStr}.csv`);
    
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
